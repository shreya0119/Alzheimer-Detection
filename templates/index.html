<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Alzheimer's Detection AI</title>
</head>
<body class="bg-light">
    <div class="container py-5 text-center">
        <h1 class="mb-4">🧠 AI-Powered Alzheimer's Detection</h1>
        <p class="text-muted"></p>
        <div class="card p-4 shadow-sm mx-auto" style="max-width: 500px;">
            <form action="/predict" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">Upload Brain MRI Scan</label>
                    <input type="file" name="file" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Analyze Scan</button>
            </form>
        </div>
    </div>
</body>
</html>
